# Netlify configuration for Heimdell CRM

[build]
  # Build command - install root deps first for @netlify/neon, then build web app
  command = "npm install && cd apps/web && npm install && npm run build"
  # Output directory (relative to repository root)
  publish = "apps/web/dist"
  # Functions directory (relative to repository root)
  functions = "netlify/functions"

[functions]
  # Functions directory relative to repository root
  directory = "netlify/functions"
  # Use ESM
  node_bundler = "esbuild"
  # Include lib folder for shared utilities
  included_files = ["netlify/functions/lib/**"]

[build.environment]
  # Node version - use Node 20
  NODE_VERSION = "20"
  # Ensure npm is available for the build
  NPM_FLAGS = "--legacy-peer-deps"

# SPA routing - redirect all requests to index.html for client-side routing
# Functions are automatically served at /.netlify/functions/* by Netlify
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
